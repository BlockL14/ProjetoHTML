<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        table{
            width: 80%;
            matgin: 50px auto;
            border-collapse: collapse;
            box-shadow: 0 4px 6px rgba(200, 200,200, 0.5);
            border-radius: 12px;
        }
        caption{
            font-size: 1.8rem;
            font-weight: bold;
            color: #007BFF;
            margin-bottom: 20px;
        }
        th, td{
            padding: 20px;
            text-alling: left;
            font-size: 1rem;
            border: 1px solid #ccc;
        }
        th{
            background-color: #00438a;
            color: #fff;
            text-transform: uppercase;
        }
        thead tr{
            border-bottom: 3px solid #333;
        }
        thead tr:hover{
            background-color: #e0f7fa;
        
        }
        tfoot{
            background-color: #e0f7fa
        }
        tfoot td{
            border-top: 2px solid #333;
        }
    </style>
</head>
<body>
    <table>
        <caption>Produtos<caption>
            <thead>
                <tr>
                    <th>Produtos</th>
                    <th>Preços</th>
                    <th>Quantidade</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>iPad</td>
                    <td>R$ 3.289,00</td>
                    <td>5</td>
                    <td>R$ 16.455,00</td>
                </tr>
                <tr>
                    <td>Sansung S26</td>
                    <td>R$ 5.500,00</td>
                    <td>3</td>
                    <td>R$ !6.500,00</td>
                </tr>
            </tbody>
            <tfoot>
                <td colspan="3">Total</td>
                <td>R$ 32955,00</td>
            </tfoot>
    </table>
</body>
</html>
